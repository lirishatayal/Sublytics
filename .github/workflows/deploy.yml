name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify production build
        run: |
          if grep -q 'src/main.jsx' dist/index.html; then
            echo "ERROR: dist/index.html still references dev source. Build failed."
            exit 1
          fi
          if ! grep -q '/Sublytics/assets/' dist/index.html; then
            echo "ERROR: dist/index.html missing /Sublytics/assets/ bundle paths."
            exit 1
          fi
          echo "Build verified:"
          grep -E 'script|link rel="stylesheet"' dist/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
